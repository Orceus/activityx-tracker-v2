name: ActivityX
run-name: "ActivityX ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build tracker
        run: pyinstaller activity_tracker.spec

      - name: Build controller
        run: pyinstaller activity_tracker_controller.spec

      - name: Write version.txt
        shell: bash
        run: |
          echo "${GITHUB_REF_NAME:-dev}" > dist/version.txt

      - name: Copy supporting files
        shell: cmd
        run: |
          copy config.py dist\config.py
          copy setup.bat dist\setup.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivityX-Windows
          path: dist/
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ActivityX-Windows
          path: release/windows

      - name: Zip release
        run: |
          cd release
          zip -r ActivityX-Windows-${{ github.ref_name }}.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ActivityX-Windows-${{ github.ref_name }}.zip
            release/windows/DesktopAppHelper.exe
            release/windows/DesktopWinHelper.exe
            release/windows/version.txt
          body: |
            ## ActivityX ${{ github.ref_name }}

            ### Installation
            1. Extract the zip
            2. Edit `config.py` with LAW_FIRM_ID
            3. Run `setup.bat`
            4. Done
