name: Build Employee Tracker

on:
  push:
    tags:
      - "v*"           # trigger on version tags: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # also allow manual runs from the GitHub Actions tab

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build activity_tracker.exe
        run: pyinstaller activity_tracker.spec

      - name: Build activity_tracker_controller.exe
        run: pyinstaller activity_tracker_controller.spec

      - name: Copy supporting files
        shell: cmd
        run: |
          copy config.py dist\config.py
          copy setup.bat dist\setup.bat
          if exist keytrk_data xcopy keytrk_data dist\keytrk_data\ /E /I /Y

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivityX-Windows
          path: dist/
          retention-days: 30

  # ── macOS build ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build activity_tracker (macOS)
        run: pyinstaller activity_tracker.spec

      - name: Copy supporting files
        run: |
          cp config.py dist/config.py
          cp setup_mac.sh dist/setup_mac.sh
          chmod +x dist/setup_mac.sh

      - name: Sign binary (macOS)
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Import certificate into temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/activityx.keychain-db
          security create-keychain -p activityx "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p activityx "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          # Sign the binary
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk '{print $2}')
          codesign --force --options runtime --sign "$IDENTITY" dist/activity_tracker
          echo "Signed with identity: $IDENTITY"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivityX-macOS
          path: dist/
          retention-days: 30

  # ── Create GitHub Release with both builds ───────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ActivityX-Windows
          path: release/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: ActivityX-macOS
          path: release/macos

      - name: Zip releases
        run: |
          cd release
          zip -r ActivityX-Windows-${{ github.ref_name }}.zip windows/
          zip -r ActivityX-macOS-${{ github.ref_name }}.zip macos/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ActivityX-Windows-${{ github.ref_name }}.zip
            release/ActivityX-macOS-${{ github.ref_name }}.zip
          body: |
            ## ActivityX Employee Tracker ${{ github.ref_name }}

            ### Before distributing
            1. Open `config.py` and fill in `SUPABASE_URL`, `SUPABASE_KEY`, and `LAW_FIRM_ID`
            2. Zip the folder and send to the client

            ### Client installation (Windows)
            1. Extract the zip
            2. Run `setup.bat` — installs to Documents\ActivityX and adds to Windows startup
            3. Done — tracker runs silently in the background from now on
